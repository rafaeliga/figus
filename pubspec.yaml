name: figus
description: "Gerencie sua coleção de figurinhas — Copa do Mundo 2026 e mais."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.2.3

  # Database
  drift: ^2.26.1
  path_provider: ^2.1.4
  path: ^1.9.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  flutter_staggered_grid_view: ^0.7.0
  country_flags: ^4.1.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  uuid: ^4.5.0
  collection: ^1.18.0

  # Share (WhatsApp + native share sheets — works on web + mobile)
  share_plus: ^13.1.0
  restart_app: ^1.3.2
  cross_file: ^0.3.4+2

  # File picking for Figuritas PDF/image import
  file_picker: ^12.0.0-beta.3

  # Camera + OCR (mobile-only; gated by Platform check in scan_page)
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  image: ^4.2.0

  # Capture widget tree as image for share cards
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1F66FF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#1F66FF"
    theme_color: "#1F66FF"

flutter:
  uses-material-design: true
  assets:
    - assets/seeds/
    - assets/icon/
